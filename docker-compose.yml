version: '3.8'

services:
  web:
    build: .
    container_name: taskapp_web
    ports:
      - "3000:3000"
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: root123
      DB_NAME: taskdb
      DB_PORT: 3306
    restart: always

  db:
    image: mysql:8.0
    container_name: taskapp_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: taskdb
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: